<div class="container mt-5">
  <div class="card p-4 shadow text-center">

    <h2 class="text-success">Booking Successful</h2>

    <p *ngIf="bookingId">
      Your Booking ID: <strong>{{ bookingId }}</strong>
    </p>

    <button class="btn btn-primary mt-3"
            (click)="goToBookings()">
      View My Bookings
    </button>

  </div>
</div>
