<div class="container mt-5 text-center">

  <h3 class="mb-4">Choose Appointment Mode</h3>

  <div class="d-flex justify-content-center gap-4">

    <!-- Online -->
    <button class="btn btn-primary px-4"
            (click)="goToOnline()">
      Online
    </button>

    <!-- Offline -->
    <button class="btn btn-secondary px-4"
            (click)="goToOffline()">
      Offline
    </button>

  </div>

</div>
