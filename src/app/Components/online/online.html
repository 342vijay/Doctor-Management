<div class="appointment-wrapper">

  <div class="appointment-card">

    <h3>Online Appointment</h3> <!-- change to Online when needed -->

    <div class="form-group">
      <label>Patient Name</label>
      <input type="text" placeholder="Enter name" [formControl]="patientName">
    </div>

    <div class="form-group">
      <label>Age</label>
      <input type="number" placeholder="Enter age" [formControl]="age">
    </div>

    <div class="form-group">
      <label>Issue</label>
      <input type="text" placeholder="Enter issue" [formControl]="issue">
    </div>

    <div class="form-group">
      <label>Specialty</label>
      <select [formControl]="specialty" (change)="loadDoctors()">
        <option value="">Select Specialty</option>
        @for (s of specialties(); track s) {
          <option [value]="s">{{ s }}</option>
        }
      </select>
    </div>

    <div class="form-group">
      <label>Doctor</label>
      <select [formControl]="doctor" (change)="loadSlots()">
        <option [value]="0">Select Doctor</option>
        @for (d of doctors(); track d.doctorId) {
          <option [value]="d.doctorId">{{ d.doctorName }}</option>
        }
      </select>
    </div>

    <div class="form-group">
      <label>Date</label>
      <input type="date" [formControl]="date" (change)="loadSlots()">
    </div>

    <div class="form-group">
      <label>Available Slots</label>
      <select [formControl]="slot">
        <option value="">Select Slot</option>
        @for (s of slots(); track s) {
          <option [value]="s">{{ s }}</option>
        }
      </select>
    </div>

    <button (click)="bookAppointment()">Book Appointment</button>

    <p class="success-message">{{ message() }}</p>

  </div>

</div>
